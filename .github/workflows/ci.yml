name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_build_from_source: "true"

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Copy schema.sql into dist
        run: mkdir -p dist/state && cp src/state/schema.sql dist/state/

      - name: Verify committed dist/ matches source
        # OpenClaw's `plugins install git:` runs `npm install --omit=dev`,
        # which strips typescript. dist/ must be committed for git installs
        # to work. This step fails CI if a PR modifies src/ without
        # committing the corresponding dist/ rebuild.
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo '::error::dist/ is out of sync with src/. Run `npm run build` and commit dist/.'
            git status --porcelain dist/
            git --no-pager diff --stat dist/
            exit 1
          fi

      - name: Test
        run: node --test tests/*.mjs

      - name: Smoke
        # Use a Node ESM loader hook to stub `openclaw/plugin-sdk/plugin-entry`
        # since the real package only exists inside the OpenClaw runtime, not
        # on npm. The stub returns the descriptor object unchanged, letting
        # smoke.mjs exercise register().
        run: node --import ./scripts/register-smoke-loader.mjs scripts/smoke.mjs
