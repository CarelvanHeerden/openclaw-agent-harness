name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_build_from_source: "true"

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Copy schema.sql into dist
        run: mkdir -p dist/state && cp src/state/schema.sql dist/state/

      - name: Test
        run: node --test tests/*.mjs
